<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberWealth - 財富總覽</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-200 p-4">

    <div id="login-ui" class="fixed inset-0 flex items-center justify-center bg-slate-950 z-50">
        <div class="bg-slate-900 p-8 rounded-2xl w-full max-w-sm text-center border border-slate-800">
            <h2 class="text-xl font-bold mb-4">系統登入</h2>
            <input type="password" id="pw-field" placeholder="輸入密碼" class="w-full bg-slate-800 p-3 rounded-lg mb-4 text-center text-white border border-slate-700">
            <button onclick="login()" class="w-full py-3 bg-cyan-600 rounded-lg font-bold">進入</button>
        </div>
    </div>

    <div id="main-ui" class="hidden space-y-4">
        <h1 class="text-lg font-bold text-white">財富總覽</h1>
        
        <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800">
            <div class="text-xs text-slate-400">總流動淨資產 (現金 + 股票)</div>
            <div id="v-liquid" class="text-3xl font-black text-emerald-400 my-1">HK$ 0</div>
            <div class="mt-4 pt-4 border-t border-slate-800 text-xs grid grid-cols-2 gap-2">
                <div>負債總額：<span id="v-loan" class="text-rose-400 font-bold">0</span></div>
            </div>
        </div>

        <div class="bg-slate-900 p-4 rounded-2xl border border-slate-800">
            <h2 class="text-sm font-bold mb-3 text-slate-400">各幣種存款</h2>
            <div id="v-currencies" class="space-y-2"></div>
        </div>
    </div>

    <script>
        // 模擬數據結構 (你可以隨時修改這裡)
        let data = {
            acc: [
                { name: 'HSBC', bal: 50000, cur: 'HKD', type: 'CASH' },
                { name: 'Citi', bal: 1200, cur: 'USD', type: 'CASH' },
                { name: '貸款', bal: -20000, cur: 'HKD', type: 'LOAN' }
            ],
            stk: [{ val: 15000 }] // 股票價值
        };

        function login() {
            if (document.getElementById('pw-field').value === "Step0926") {
                document.getElementById('login-ui').style.display = 'none';
                document.getElementById('main-ui').style.display = 'block';
                render();
            } else { alert('密碼錯誤'); }
        }

        function render() {
            let cashTotal = 0, loanTotal = 0, currencies = {};

            data.acc.forEach(a => {
                if (a.type === 'LOAN') {
                    loanTotal += Math.abs(a.bal);
                } else {
                    cashTotal += a.bal; // 這裡假設 HKD 為主，其他貨幣後續可加入匯率計算
                    currencies[a.cur] = (currencies[a.cur] || 0) + a.bal;
                }
            });

            // 顯示數據
            document.getElementById('v-liquid').innerText = `HK$ ${(cashTotal + data.stk[0].val).toLocaleString()}`;
            document.getElementById('v-loan').innerText = `HK$ ${loanTotal.toLocaleString()}`;
            
            let curHtml = '';
            for (let c in currencies) {
                curHtml += `<div class="flex justify-between font-mono"><span>${c}</span><span>${currencies[c].toLocaleString()}</span></div>`;
            }
            document.getElementById('v-currencies').innerHTML = curHtml;
        }
    </script>
</body>
</html>
