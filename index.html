<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>理財主控台</title>
</head>
<body style="background:#020617; color:white; font-family: sans-serif; display:flex; justify-content:center; align-items:center; height:100vh; margin:0;">

    <button onclick="document.location.href='https://你的網址?login=success'" style="padding:20px 40px; background: #06b6d4; border:none; border-radius:10px; font-weight:bold; font-size: 20px;">
        進入理財系統
    </button>

    <script>
        // 如果網址包含 login=success，就直接顯示內容
        if (window.location.search.includes('login=success')) {
            alert('登入成功！');
            // 在這裡載入你的 dashboard
        }
    </script>
</body>
</html>
