<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberWealth - 安全個人智慧理財主控台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'Noto Sans TC', 'sans-serif'] },
                    colors: {
                        cyberDark: '#030712', cyberSlate: '#0b0f19', cyberCard: '#111827',
                        neonCyan: '#38bdf8', neonGreen: '#10b981', neonPurple: '#a855f7', neonRed: '#f43f5e', neonOrange: '#fb923c'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #030712;
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(56, 189, 248, 0.03) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(168, 85, 247, 0.03) 0%, transparent 45%),
                linear-gradient(rgba(255, 255, 255, 0.002) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.002) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 40px 40px, 40px 40px;
        }
        .warning-pulse { animation: pulseRed 2s infinite ease-in-out; }
        @keyframes pulseRed {
            0%, 100% { box-shadow: 0 0 8px rgba(244, 63, 94, 0.3); border-color: rgba(244, 63, 94, 0.4); }
            50% { box-shadow: 0 0 15px rgba(244, 63, 94, 0.7); border-color: rgba(244, 63, 94, 1); }
        }
    </style>
</head>
<body class="text-slate-300 min-h-screen flex flex-col p-4 md:p-8">

    <div id="crypto-lock-screen" class="fixed inset-0 bg-cyberDark z-50 flex flex-col items-center justify-center p-4 transition-opacity duration-500">
        <div class="max-w-md w-full bg-slate-900 border border-slate-800 p-8 rounded-2xl text-center shadow-2xl relative overflow-hidden">
            <div class="w-16 h-16 rounded-full bg-cyan-500/10 border border-cyan-500/30 flex items-center justify-center text-cyan-400 text-2xl mx-auto mb-4 animate-bounce">
                <i class="fa-solid fa-key"></i>
            </div>
            <h2 class="text-xl font-bold text-white mb-2 tracking-wide" id="lock-title">主控台安全解鎖</h2>
            <p class="text-xs text-slate-500 mb-6" id="lock-desc">請設定或輸入您的專屬密碼。此密碼將作為本地數據 AES-256 加密的唯一密鑰。</p>
            
            <input type="password" id="master-password-input" placeholder="輸入解密密碼" class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-center text-white text-lg tracking-widest focus:outline-none focus:border-cyan-400 transition mb-4">
            
            <button onclick="unlockDashboard()" class="w-full py-3 bg-gradient-to-r from-cyan-500 to-blue-600 hover:brightness-110 text-slate-950 font-extrabold rounded-xl transition duration-200">
                <i class="fa-solid fa-unlock-keyhole mr-1"></i> 驗證密碼並安全還理解密
            </button>
            <div class="mt-4 text-[10px] text-slate-600">🛡️ 金融級前端加密：所有資產數據皆儲存於本地瀏覽器沙盒，不經任何伺服器。</div>
        </div>
    </div>

    <header class="max-w-7xl w-full mx-auto flex flex-col md:flex-row justify-between items-center mb-8 border-b border-slate-800 pb-5 gap-4">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-neonCyan to-neonPurple flex items-center justify-center text-white">
                <i class="fa-solid fa-shield-halved text-lg"></i>
            </div>
            <div>
                <h1 class="text-2xl font-extrabold text-white tracking-wider flex items-center gap-2">CYBERWEALTH</h1>
                <p class="text-xs text-slate-500">AES-256 本地加密保護中 · 網頁動態可編輯版</p>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <button onclick="lockSystem()" class="px-3 py-1.5 bg-slate-900 hover:bg-slate-800 text-slate-400 hover:text-white border border-slate-800 rounded text-xs transition">
                <i class="fa-solid fa-lock mr-1"></i> 安全鎖定
            </button>
            <button onclick="resetToDemoData()" class="px-3 py-1.5 bg-rose-950/30 hover:bg-rose-900/50 text-rose-400 border border-rose-900/30 rounded text-xs transition">
                <i class="fa-solid fa-trash-can mr-1"></i> 清空並重置
            </button>
        </div>
    </header>

    <main id="dashboard-content" class="max-w-7xl w-full mx-auto flex flex-col gap-6 opacity-20 pointer-events-none transition-opacity duration-500">
        
        <section class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 bg-gradient-to-br from-slate-900 to-cyberSlate p-6 rounded-2xl border border-slate-800 flex flex-col justify-between shadow-lg">
                <div>
                    <span class="text-xs font-bold text-slate-500 uppercase tracking-widest">當前真實淨資產 (Net Worth)</span>
                    <div class="my-3 flex items-baseline gap-2">
                        <span class="text-5xl font-black text-white tracking-tight" id="net-worth-display">HK$ 0</span>
                    </div>
                </div>
                <div class="border-t border-slate-800/80 pt-4 mt-4 grid grid-cols-2 md:grid-cols-4 gap-4 text-xs">
                    <div><span class="text-slate-500 block mb-1">總流動資產</span><span class="font-bold text
