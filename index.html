<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CyberWealth - 智慧連動理財主控台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+TC:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 
                        sans: ['Inter', 'Noto Sans TC', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'] 
                    },
                    colors: {
                        cyberDark: '#020617', cyberSlate: '#0f172a', cyberCard: '#1e293b',
                        neonCyan: '#06b6d4', neonGreen: '#10b981', neonPurple: '#8b5cf6', neonRed: '#f43f5e', neonOrange: '#f97316'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #020617;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(6, 182, 212, 0.04) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.04) 0%, transparent 50%),
                linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 32px 32px, 32px 32px;
            -webkit-text-size-adjust: 100%;
        }
        .glass-panel {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .warning-pulse { animation: pulseRed 2s infinite ease-in-out; }
        @keyframes pulseRed {
            0%, 100% { box-shadow: 0 0 10px rgba(244, 63, 94, 0.2); border-color: rgba(244, 63, 94, 0.3); }
            50% { box-shadow: 0 0 20px rgba(244, 63, 94, 0.6); border-color: rgba(244, 63, 94, 0.8); }
        }
        input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }
        ::-webkit-scrollbar { width: 4px; height: 6px; }
        ::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.5); border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(71, 85, 105, 0.8); border-radius: 4px; }
        .mobile-table-wrapper { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .table-min-w input, .table-min-w select { min-width: 80px; }
    </style>
</head>
<body class="text-slate-300 min-h-screen flex flex-col p-3 md:p-8 selection:bg-neonCyan selection:text-slate-900">

    <div id="crypto-lock-screen" class="fixed inset-0 bg-cyberDark/95 backdrop-blur-md z-[100] flex flex-col items-center justify-center p-4 transition-opacity duration-500">
        <div class="max-w-md w-full glass-panel p-6 md:p-8 rounded-3xl text-center relative overflow-hidden border border-slate-700/50">
            <div class="w-16 h-16 md:w-20 md:h-20 rounded-full bg-gradient-to-br from-cyan-500/20 to-blue-500/20 border border-cyan-500/30 flex items-center justify-center text-cyan-400 text-2xl md:text-3xl mx-auto mb-6 shadow-[0_0_30px_rgba(6,182,212,0.2)]">
                <i class="fa-solid fa-fingerprint"></i>
            </div>
            <h2 class="text-xl md:text-2xl font-bold text-white mb-2 tracking-widest" id="lock-title">主控台安全解鎖</h2>
            <p class="text-xs md:text-sm text-slate-400 mb-8" id="lock-desc">AES-256 本地端軍規加密。<br>請輸入您的專屬密鑰以存取財務沙盒。</p>
            
            <div class="relative w-full mb-6 group">
                <input type="password" id="master-password-input" placeholder="ENTER PASSPHRASE" 
                       autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false"
                       class="w-full bg-slate-900/80 border-2 border-slate-700 rounded-xl px-4 py-3 md:py-4 pr-12 text-center text-white font-mono text-lg tracking-[0.2em] focus:outline-none focus:border-cyan-400 transition-colors shadow-inner">
                <button type="button" onclick="togglePasswordVisibility()" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 hover:text-cyan-400 focus:outline-none transition-colors">
                    <i class="fa-solid fa-eye text-lg" id="toggle-pwd-icon"></i>
                </button>
            </div>
            
            <button onclick="unlockDashboard()" class="w-full py-3 md:py-4 bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 text-slate-950 font-black rounded-xl transition duration-300 shadow-[0_0_20px_rgba(6,182,212,0.3)] tracking-wide mb-4">
                <i class="fa-solid fa-unlock mr-2"></i> 驗證身分並解密
            </button>
            
            <div class="flex flex-col gap-2 mt-4 pt-4 border-t border-slate-700/50">
                <button onclick="importData()" class="w-full py-2 hover:bg-emerald-500/10 text-emerald-500/80 hover:text-emerald-400 rounded-lg text-xs transition duration-200 font-bold border border-emerald-500/20">
                    <i class="fa-solid fa-file-import mr-1"></i> 匯入資料 (跨設備同步用)
                </button>
                <button onclick="resetToDemoData()" class="w-full py-2 hover:bg-rose-500/10 text-rose-500/70 hover:text-rose-400 rounded-lg text-xs transition duration-200">
                    <i class="fa-solid fa-triangle-exclamation mr-1"></i> 強制清空並重置系統
                </button>
            </div>
        </div>
    </div>

    <header class="max-w-[1400px] w-full mx-auto flex flex-col md:flex-row justify-between items-start md:items-center mb-6 border-b border-slate-800/60 pb-4 gap-4">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 md:w-12 md:h-12 rounded-xl bg-gradient-to-br from-cyan-500 to-purple-600 flex items-center justify-center text-white shadow-[0_0_20px_rgba(6,182,212,0.4)] flex-shrink-0">
                <i class="fa-solid fa-bolt text-lg md:text-xl"></i>
            </div>
            <div>
                <h1 class="text-xl md:text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-white to-slate-400 tracking-wider">CYBERWEALTH</h1>
                <p class="text-[10px] md:text-xs text-emerald-400 font-medium tracking-wide mt-1"><i class="fa-solid fa-link mr-1"></i>流水帳連動 · AES-256 保護</p>
            </div>
        </div>
        <div class="flex flex-wrap items-center gap-2">
            <button onclick="exportData()" class="px-3 py-1.5 bg-slate-800 hover:bg-slate-700 text-slate-300 border border-slate-700 rounded-lg text-xs md:text-sm transition-all shadow-sm">
                <i class="fa-solid fa-file-export mr-1"></i> 匯出備份
            </button>
            <button onclick="lockSystem()" class="px-3 py-1.5 bg-slate-800 hover:bg-slate-700 text-rose-400 border border-slate-700 rounded-lg text-xs md:text-sm transition-all shadow-sm">
                <i class="fa-solid fa-lock mr-1"></i> 鎖定
            </button>
        </div>
    </header>

    <main id="dashboard-content" class="max-w-[1400px] w-full mx-auto flex flex-col gap-6 opacity-20 pointer-events-none transition-opacity duration-700 pb-10">
        
        <section class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 glass-panel p-5 md:p-8 rounded-3xl relative overflow-hidden group">
                <div class="absolute top-0 right-0 w-64 h-64 bg-cyan-500/5 rounded-full blur-3xl -translate-y-1/2 translate-x-1/4"></div>
                <div class="relative z-10">
                    <span class="text-sm font-bold text-slate-400 uppercase tracking-[0.2em] flex items-center">
                        總流動資產 (Liquid Assets)
                        <i class="fa-solid fa-circle-info text-[10px] ml-2 opacity-50" title="現金 + 股票 - 信用卡負債"></i>
                    </span>
                    <div class="my-3 md:my-4 flex items-baseline gap-2">
                        <span class="text-4xl md:text-6xl font-black text-emerald-400 tracking-tighter font-mono" id="liquid-assets-display">HK$ 0</span>
                    </div>
                </div>
                <div class="border-t border-slate-700/50 pt-4 mt-5 grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-6 text-sm relative z-10">
                    <div><span class="text-slate-500 block mb-1 font-medium text-xs md:text-sm">現金資產</span><span class="font-bold text-white font-mono text-base md:text-lg" id="cash-assets-display">HK$
